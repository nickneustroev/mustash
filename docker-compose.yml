services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotify-helper
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/history.db
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotify-helper-backup
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/history.db
    volumes:
      - ./data:/app/data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "$$BACKUP_ENABLED" = "true" ]; then \
          echo "Backup enabled, starting cron..."; \
          printf '%s cd /app && node dist/backup-s3.js >> /var/log/backup.log 2>&1\n' "$$BACKUP_CRON" | crontab -; \
          touch /var/log/backup.log; \
          tail -F /var/log/backup.log & \
          exec cron -f; \
        else \
          echo "Backup not enabled, sleeping..."; \
          tail -f /dev/null; \
        fi
    restart: unless-stopped
    profiles:
      - backup

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.prisma-studio
    container_name: spotify-helper-prisma-studio
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/history.db
    ports:
      - "5555:5555"
    expose:
      - "5555"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5555/', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  data:
