services:
  auto-playlists:
    build:
      context: .
      dockerfile: apps/auto-playlists/Dockerfile
    environment:
      NODE_ENV: production
      SPOTIFY_CLIENT_ID:
      SPOTIFY_CLIENT_SECRET:
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:3000/callback}
      SPOTIFY_PROXY_URL: ${SPOTIFY_PROXY_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-5000}
      SPOTIFY_MIN_REQUEST_GAP_MS: ${SPOTIFY_MIN_REQUEST_GAP_MS:-100}
      TRACK_MONITORING_ENABLED: ${TRACK_MONITORING_ENABLED:-true}
      AUTO_PLAYLISTS_PLAYLIST_PREFIX: ${AUTO_PLAYLISTS_PLAYLIST_PREFIX:-}
      AUTO_PLAYLISTS_PLAYLIST_SUFFIX: ${AUTO_PLAYLISTS_PLAYLIST_SUFFIX:-[AUTO]}
      AUTO_PLAYLISTS_FREQUENT_SYNC_INTERVAL_MS: ${AUTO_PLAYLISTS_FREQUENT_SYNC_INTERVAL_MS:-600000}
      AUTO_PLAYLISTS_RARE_SYNC_INTERVAL_MS: ${AUTO_PLAYLISTS_RARE_SYNC_INTERVAL_MS:-10800000}
      SAVED_RECENT_COVER_COLOR: ${SAVED_RECENT_COVER_COLOR:-000000}
      SAVED_IN_YEAR_COVER_COLOR: ${SAVED_IN_YEAR_COVER_COLOR:-060E73}
      SAVED_RECENT_WINDOWS: ${SAVED_RECENT_WINDOWS:-50,200}
      SAVED_IN_YEAR_YEARS: ${SAVED_IN_YEAR_YEARS:-2024,2025}
      APP_LOCALE: ${APP_LOCALE:-EN}
    ports:
      - "3000:3000"
    restart: unless-stopped
