services:
  auto-playlists:
    build:
      context: .
      dockerfile: apps/auto-playlists/Dockerfile
    environment:
      NODE_ENV: production
      SPOTIFY_CLIENT_ID:
      SPOTIFY_CLIENT_SECRET:
      SPOTIFY_REDIRECT_URI:
      SPOTIFY_LISTEN_PORT:
      SPOTIFY_PROXY_URL:
      DATABASE_URL:
      POLL_INTERVAL_MS:
      SPOTIFY_MIN_REQUEST_GAP_MS:
      TRACK_MONITORING_ENABLED:
      AUTO_PLAYLISTS_PLAYLIST_PREFIX:
      AUTO_PLAYLISTS_PLAYLIST_SUFFIX:
      AUTO_PLAYLISTS_FREQUENT_SYNC_INTERVAL_MS:
      AUTO_PLAYLISTS_RARE_SYNC_INTERVAL_MS:
      SAVED_RECENT_COVER_COLOR:
      SAVED_IN_YEAR_COVER_COLOR:
      SAVED_RECENT_WINDOWS:
      SAVED_IN_YEAR_YEARS:
      APP_LOCALE:
    ports:
      - "${SPOTIFY_LISTEN_PORT}:${SPOTIFY_LISTEN_PORT}"
    restart: unless-stopped
